<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Leaderboard | Dashboard Dinamis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        
        :root {
            --primary: #3b82f6;
            --accent: #f59e0b;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc; 
            color: #1e293b;
        }

        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .rank-gold { background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%); }
        .rank-silver { background: linear-gradient(135deg, #cbd5e1 0%, #94a3b8 100%); }
        .rank-bronze { background: linear-gradient(135deg, #d97706 0%, #92400e 100%); }
        
        .refresh-progress {
            height: 4px;
            background: var(--primary);
            width: 0%;
            transition: width 1s linear;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 9999;
        }

        .crown-icon {
            color: var(--accent);
            filter: drop-shadow(0 0 3px rgba(245, 158, 11, 0.4));
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-4px) scale(1.1); }
        }

        @media (max-width: 640px) {
            .table-container { max-height: 400px; }
        }
    </style>
</head>
<body class="antialiased">
    <!-- Indikator Refresh -->
    <div id="refreshProgress" class="refresh-progress"></div>

    <div class="min-h-screen pb-12">
        <!-- Header Navigasi -->
        <nav class="sticky top-0 z-40 w-full bg-white/80 backdrop-blur-md border-b border-slate-200 mb-6 md:mb-10">
            <div class="max-w-7xl mx-auto px-4 h-16 md:h-20 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="bg-blue-600 p-2 rounded-xl text-white">
                        <i class="fas fa-trophy text-lg"></i>
                    </div>
                    <div>
                        <h1 class="text-lg md:text-xl font-black tracking-tight leading-tight">Sales Leader</h1>
                        <p class="hidden md:block text-[10px] text-slate-500 font-medium uppercase tracking-tighter">Performance Monitoring</p>
                    </div>
                </div>

                <!-- Kontrol Desktop -->
                <div class="hidden md:flex items-center gap-4">
                    <div class="flex items-center gap-2 bg-slate-100 p-1 rounded-2xl border border-slate-200">
                        <button id="btnMonthD" onclick="switchView('month')" class="px-5 py-2 rounded-xl text-xs font-bold transition-all bg-white shadow-sm text-blue-600">Bulanan</button>
                        <button id="btnYearD" onclick="switchView('year')" class="px-5 py-2 rounded-xl text-xs font-bold transition-all text-slate-500 hover:bg-white/50">Tahunan</button>
                    </div>
                    
                    <select id="monthSelector" onchange="updateDashboard()" class="bg-white border border-slate-200 text-slate-700 text-xs font-bold rounded-xl p-2.5 focus:ring-2 focus:ring-blue-500 outline-none">
                        <!-- Pilihan Bulan oleh JS -->
                    </select>
                </div>

                <!-- Tombol Refresh Mobile -->
                <button onclick="fetchData()" class="md:hidden text-slate-400 p-2">
                    <i class="fas fa-sync-alt" id="refreshIconMobile"></i>
                </button>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto px-4">
            <!-- Kontrol Mobile -->
            <div class="md:hidden flex flex-col gap-3 mb-6">
                <select id="monthSelectorM" onchange="syncSelectors(this, 'monthSelector')" class="bg-white border border-slate-200 text-slate-700 text-sm font-bold rounded-2xl p-3 shadow-sm outline-none">
                </select>
                <div class="flex bg-slate-200/50 p-1 rounded-2xl">
                    <button id="btnMonthM" onclick="switchView('month')" class="flex-1 py-2.5 rounded-xl text-sm font-bold transition-all bg-white shadow-sm text-blue-600">Bulanan</button>
                    <button id="btnYearM" onclick="switchView('year')" class="flex-1 py-2.5 rounded-xl text-sm font-bold transition-all text-slate-500">Tahunan</button>
                </div>
            </div>

            <!-- Kartu Statistik -->
            <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6 mb-8 md:mb-12">
                <div class="bg-white p-5 md:p-6 rounded-[2rem] border border-slate-200 shadow-sm">
                    <div class="flex items-center gap-3 mb-4">
                        <div class="w-8 h-8 rounded-full bg-blue-50 flex items-center justify-center text-blue-500">
                            <i class="fas fa-shopping-cart text-xs"></i>
                        </div>
                        <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Total Unit</span>
                    </div>
                    <h3 id="statTotal" class="text-2xl md:text-3xl font-black text-slate-800">0</h3>
                    <p class="text-[10px] text-slate-400 mt-1 font-medium"><span class="view-label">...</span></p>
                </div>

                <div class="bg-white p-5 md:p-6 rounded-[2rem] border border-slate-200 shadow-sm">
                    <div class="flex items-center gap-3 mb-4">
                        <div class="w-8 h-8 rounded-full bg-amber-50 flex items-center justify-center text-amber-500">
                            <i class="fas fa-crown text-xs"></i>
                        </div>
                        <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Top Sales</span>
                    </div>
                    <h3 id="statTop" class="text-lg md:text-xl font-black text-blue-600 truncate flex items-center gap-2">-</h3>
                    <p class="text-[10px] text-slate-400 mt-1 font-medium italic">Leader</p>
                </div>

                <div class="bg-white p-5 md:p-6 rounded-[2rem] border border-slate-200 shadow-sm">
                    <div class="flex items-center gap-3 mb-4">
                        <div class="w-8 h-8 rounded-full bg-green-50 flex items-center justify-center text-green-500">
                            <i class="fas fa-chart-line text-xs"></i>
                        </div>
                        <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Skor Tertinggi</span>
                    </div>
                    <h3 id="statHighest" class="text-2xl md:text-3xl font-black text-slate-800">0</h3>
                    <p class="text-[10px] text-slate-400 mt-1 font-medium">Rekor Performa</p>
                </div>

                <div class="bg-white p-5 md:p-6 rounded-[2rem] border border-slate-200 shadow-sm">
                    <div class="flex items-center gap-3 mb-4">
                        <div class="w-8 h-8 rounded-full bg-purple-50 flex items-center justify-center text-purple-500">
                            <i class="fas fa-users text-xs"></i>
                        </div>
                        <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Rata-rata</span>
                    </div>
                    <h3 id="statAvg" class="text-2xl md:text-3xl font-black text-slate-800">0</h3>
                    <p class="text-[10px] text-slate-400 mt-1 font-medium">Per Orang</p>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 items-start">
                <!-- Tabel Leaderboard -->
                <div class="lg:col-span-5 bg-white rounded-[2.5rem] shadow-xl shadow-slate-200/50 border border-slate-200 overflow-hidden">
                    <div class="px-8 py-6 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                        <h2 class="text-xs font-black text-slate-800 uppercase tracking-[0.2em]">Peringkat <span class="view-label">...</span></h2>
                        <span class="text-[10px] font-bold text-green-500 flex items-center gap-1.5">
                            <span class="w-1.5 h-1.5 rounded-full bg-green-500"></span> Live
                        </span>
                    </div>
                    <div class="overflow-y-auto max-h-[500px] md:max-h-[600px]">
                        <table class="w-full text-left">
                            <tbody id="leaderboardBody" class="divide-y divide-slate-50 text-sm">
                                <!-- Baris Data -->
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Grafik Visualisasi -->
                <div class="lg:col-span-7 space-y-6">
                    <div class="bg-white p-6 md:p-10 rounded-[2.5rem] shadow-xl shadow-slate-200/50 border border-slate-200">
                        <div class="flex items-center justify-between mb-8">
                            <h2 class="text-xs font-black text-slate-800 uppercase tracking-[0.2em]">Visual Performa</h2>
                        </div>
                        <div class="relative h-[300px] md:h-[450px]">
                            <canvas id="mainChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const SHEET_ID = '1dwJ4KYy5PuNoQ3AZlQMr3BfXtRzQ_Dh7RLgIryYBPuc';
        const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&tq=SELECT+B,C,D,E,F,G,H,I,J,K,L,M,N,O+WHERE+B+IS+NOT+NULL&gid=0`;

        const monthNames = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
        let currentView = 'month';
        let rawData = [];
        let mainChart = null;
        let refreshInterval = 30;
        let secondsPassed = 0;

        function setupSelectors() {
            const now = new Date();
            const currentMonthIdx = now.getMonth();
            const monthSelectors = [document.getElementById('monthSelector'), document.getElementById('monthSelectorM')];

            monthSelectors.forEach(sel => {
                if (!sel || sel.options.length > 0) return;
                monthNames.forEach((name, index) => {
                    const option = document.createElement('option');
                    option.value = index;
                    option.text = name;
                    if (index === currentMonthIdx) option.selected = true;
                    sel.appendChild(option);
                });
            });
        }

        function syncSelectors(source, targetId) {
            document.getElementById(targetId).value = source.value;
            updateDashboard();
        }

        async function init() {
            setupSelectors();
            await fetchData();
            startAutoRefresh();
        }

        async function fetchData() {
            const iconM = document.getElementById('refreshIconMobile');
            if(iconM) iconM.classList.add('fa-spin');
            
            try {
                const response = await fetch(`${SHEET_URL}&cb=${new Date().getTime()}`);
                const csv = await response.text();
                rawData = parseCSV(csv);
                updateDashboard();
                secondsPassed = 0;
            } catch (e) {
                console.error("Fetch error:", e);
            } finally {
                if(iconM) setTimeout(() => iconM.classList.remove('fa-spin'), 800);
            }
        }

        function startAutoRefresh() {
            setInterval(() => {
                secondsPassed++;
                document.getElementById('refreshProgress').style.width = `${(secondsPassed / refreshInterval) * 100}%`;
                if (secondsPassed >= refreshInterval) fetchData();
            }, 1000);
        }

        function parseCSV(csv) {
            const lines = csv.split('\n');
            return lines.slice(1).filter(l => l.trim()).map(line => {
                const cols = line.split(/,(?=(?:[^"]*"[^"]*")*[^"]*$)/).map(c => c.replace(/"/g, '').trim());
                const monthlyData = cols.slice(1, 13).map(v => parseFloat(v.replace(/[^0-9.-]+/g, "")) || 0);
                const totalYearly = parseFloat(cols[13]?.replace(/[^0-9.-]+/g, "") || 0);
                return { name: cols[0], monthly: monthlyData, total: totalYearly };
            }).filter(d => d.name && d.name.toLowerCase() !== 'nama');
        }

        function switchView(view) {
            currentView = view;
            const btnMonthD = document.getElementById('btnMonthD');
            const btnYearD = document.getElementById('btnYearD');
            const btnMonthM = document.getElementById('btnMonthM');
            const btnYearM = document.getElementById('btnYearM');
            const monthSelectors = [document.getElementById('monthSelector'), document.getElementById('monthSelectorM')];

            if(view === 'month') {
                [btnMonthD, btnMonthM].forEach(b => b.className = "px-5 py-2 flex-1 rounded-xl text-xs font-bold transition-all bg-white shadow-sm text-blue-600");
                [btnYearD, btnYearM].forEach(b => b.className = "px-5 py-2 flex-1 rounded-xl text-xs font-bold transition-all text-slate-500 hover:bg-white/50");
                monthSelectors.forEach(s => s.classList.remove('hidden'));
            } else {
                [btnYearD, btnYearM].forEach(b => b.className = "px-5 py-2 flex-1 rounded-xl text-xs font-bold transition-all bg-white shadow-sm text-blue-600");
                [btnMonthD, btnMonthM].forEach(b => b.className = "px-5 py-2 flex-1 rounded-xl text-xs font-bold transition-all text-slate-500 hover:bg-white/50");
                monthSelectors.forEach(s => s.classList.add('hidden'));
            }
            updateDashboard();
        }

        function updateDashboard() {
            const monthIdx = parseInt(document.getElementById('monthSelector').value);
            const labels = document.querySelectorAll('.view-label');
            labels.forEach(el => el.innerText = currentView === 'month' ? monthNames[monthIdx] : 'Total 2026');

            let displayData = rawData.map(d => ({
                name: d.name,
                value: currentView === 'month' ? d.monthly[monthIdx] : d.total
            })).sort((a,b) => b.value - a.value);

            const body = document.getElementById('leaderboardBody');
            body.innerHTML = '';
            let totalUnit = 0;

            displayData.forEach((d, i) => {
                totalUnit += d.value;
                let badge = "bg-slate-100 text-slate-400";
                let crown = "";
                if(i===0 && d.value > 0) { badge = "rank-gold text-white"; crown = '<i class="fas fa-crown crown-icon ml-2"></i>'; }
                else if(i===1 && d.value > 0) badge = "rank-silver text-white";
                else if(i===2 && d.value > 0) badge = "rank-bronze text-white";

                body.innerHTML += `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="px-8 py-5 w-20">
                            <span class="w-8 h-8 flex items-center justify-center rounded-xl text-[10px] font-black ${badge}">${i+1}</span>
                        </td>
                        <td class="py-5 font-bold text-slate-700">
                            <div class="flex items-center">${d.name} ${crown}</div>
                        </td>
                        <td class="px-8 py-5 text-right font-mono font-black text-slate-900 text-base">${d.value.toLocaleString()}</td>
                    </tr>
                `;
            });

            document.getElementById('statTotal').innerText = totalUnit.toLocaleString();
            document.getElementById('statTop').innerHTML = displayData[0]?.value > 0 
                ? `<span class="truncate max-w-[120px]">${displayData[0].name}</span> <i class="fas fa-crown crown-icon text-sm"></i>` 
                : "-";
            document.getElementById('statHighest').innerText = (displayData[0]?.value || 0).toLocaleString();
            const activeSales = displayData.filter(x => x.value > 0).length || 1;
            document.getElementById('statAvg').innerText = (totalUnit / activeSales).toFixed(1);

            renderChart(displayData);
        }

        function renderChart(data) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if(mainChart) mainChart.destroy();
            const chartData = data.filter(d => d.value > 0).slice(0, 10);
            
            mainChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: chartData.map(d => d.name),
                    datasets: [{
                        data: chartData.map(d => d.value),
                        backgroundColor: (c) => c.index === 0 ? '#f59e0b' : '#3b82f6',
                        borderRadius: 12,
                        barThickness: window.innerWidth < 768 ? 15 : 25
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { 
                        y: { grid: { display: false }, ticks: { font: { weight: '600', size: 11 } } },
                        x: { beginAtZero: true, grid: { color: '#f1f5f9' } }
                    }
                }
            });
        }

        window.onload = init;
    </script>
</body>
</html>
