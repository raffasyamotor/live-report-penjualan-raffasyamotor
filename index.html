<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Leaderboard | Dashboard Dinamis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .rank-gold { background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%); }
        .rank-silver { background: linear-gradient(135deg, #94a3b8 0%, #64748b 100%); }
        .rank-bronze { background: linear-gradient(135deg, #d97706 0%, #92400e 100%); }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); }
        
        /* Animasi progress bar untuk indikator refresh */
        .refresh-progress {
            height: 3px;
            background: #3b82f6;
            width: 0%;
            transition: width 1s linear;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 9999;
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <!-- Indikator Auto-Refresh -->
    <div id="refreshProgress" class="refresh-progress"></div>

    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <header class="mb-10 flex flex-col lg:flex-row lg:items-center justify-between gap-6">
            <div class="text-left">
                <div class="inline-block p-2 px-4 rounded-full bg-blue-100 text-blue-700 text-[10px] font-bold uppercase tracking-widest mb-3">
                    Real-time Auto-Sync System
                </div>
                <h1 class="text-3xl md:text-4xl font-black text-slate-900 tracking-tight">🏆 Dashboard Penjualan</h1>
                <p class="text-slate-500 text-sm mt-1">Data diperbarui otomatis setiap 30 detik.</p>
            </div>
            
            <div class="flex flex-wrap items-center gap-3">
                <!-- Status Sinkronisasi -->
                <div id="syncStatus" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mr-2 flex items-center">
                    <span class="relative flex h-2 w-2 mr-2">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
                    </span>
                    Tersinkronisasi
                </div>

                <!-- Month Selector -->
                <div id="monthSelectorContainer" class="hidden">
                    <select id="monthSelector" onchange="updateDashboard()" class="bg-white border border-slate-200 text-slate-700 text-sm font-bold rounded-xl focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 shadow-sm">
                        <!-- Options filled by JS -->
                    </select>
                </div>

                <!-- Tab Filters -->
                <div class="flex space-x-1 bg-white p-1 rounded-2xl shadow-sm border border-slate-200">
                    <button id="btnMonth" onclick="switchView('month')" class="px-6 py-2 rounded-xl text-sm font-bold transition-all bg-blue-600 text-white shadow-md">Bulanan</button>
                    <button id="btnYear" onclick="switchView('year')" class="px-6 py-2 rounded-xl text-sm font-bold text-slate-500 hover:bg-slate-50 transition-all">Tahunan</button>
                </div>
            </div>
        </header>

        <!-- Stats Overview -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-10">
            <div class="glass p-6 rounded-3xl card-shadow border border-white">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Total Unit (<span class="view-label">...</span>)</p>
                <h3 id="statTotal" class="text-3xl font-black text-slate-800">0</h3>
            </div>
            <div class="glass p-6 rounded-3xl card-shadow border border-white">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Top Sales</p>
                <h3 id="statTop" class="text-2xl font-black text-blue-600 truncate">-</h3>
            </div>
            <div class="glass p-6 rounded-3xl card-shadow border border-white">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Pencapaian Tertinggi</p>
                <h3 id="statHighest" class="text-3xl font-black text-slate-800">0</h3>
            </div>
            <div class="glass p-6 rounded-3xl card-shadow border border-white">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Rata-rata</p>
                <h3 id="statAvg" class="text-3xl font-black text-slate-800">0</h3>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Ranking Table -->
            <div class="lg:col-span-1 bg-white rounded-3xl shadow-xl border border-slate-200 overflow-hidden">
                <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50/30">
                    <h2 class="text-sm font-black text-slate-800 uppercase tracking-widest">Peringkat <span class="view-label">...</span></h2>
                    <button onclick="fetchData()" class="text-slate-400 hover:text-blue-600 transition-colors">
                        <i class="fas fa-sync-alt" id="refreshIcon"></i>
                    </button>
                </div>
                <div class="overflow-y-auto max-h-[600px]">
                    <table class="w-full text-left">
                        <tbody id="leaderboardBody" class="divide-y divide-slate-50 text-sm">
                            <!-- Data -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Chart Section -->
            <div class="lg:col-span-2 space-y-6">
                <div class="bg-white p-8 rounded-3xl shadow-xl border border-slate-200">
                    <h2 class="text-sm font-black text-slate-800 uppercase tracking-widest mb-8 flex items-center">
                        <i class="fas fa-chart-bar mr-2 text-blue-500"></i> Visualisasi Performa
                    </h2>
                    <div class="relative h-[450px]">
                        <canvas id="mainChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SHEET_ID = '1dwJ4KYy5PuNoQ3AZlQMr3BfXtRzQ_Dh7RLgIryYBPuc';
        const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&tq=SELECT+B,C,D,E,F,G,H,I,J,K,L,M,N,O+WHERE+B+IS+NOT+NULL&gid=0`;

        const monthNames = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
        let currentView = 'month';
        let rawData = [];
        let mainChart = null;
        let refreshInterval = 30; // Detik
        let secondsPassed = 0;

        // Initialize month dropdown
        function setupMonthSelector() {
            const selector = document.getElementById('monthSelector');
            if (selector.options.length > 0) return; // Hindari duplikasi saat auto-refresh

            const now = new Date();
            const currentMonthIdx = now.getMonth();

            monthNames.forEach((name, index) => {
                const option = document.createElement('option');
                option.value = index;
                option.text = name;
                if (index === currentMonthIdx) option.selected = true;
                selector.appendChild(option);
            });
        }

        async function init() {
            setupMonthSelector();
            await fetchData();
            startAutoRefresh();
        }

        async function fetchData() {
            const icon = document.getElementById('refreshIcon');
            if (icon) icon.classList.add('fa-spin');
            
            try {
                // Tambahkan parameter cache-buster agar data benar-benar baru
                const response = await fetch(`${SHEET_URL}&cb=${new Date().getTime()}`);
                const csv = await response.text();
                rawData = parseCSV(csv);
                updateDashboard();
                secondsPassed = 0; // Reset timer setelah berhasil fetch
                updateProgressBar();
            } catch (e) {
                console.error("Fetch error:", e);
            } finally {
                if (icon) setTimeout(() => icon.classList.remove('fa-spin'), 800);
            }
        }

        function startAutoRefresh() {
            setInterval(() => {
                secondsPassed++;
                updateProgressBar();
                
                if (secondsPassed >= refreshInterval) {
                    fetchData();
                }
            }, 1000);
        }

        function updateProgressBar() {
            const bar = document.getElementById('refreshProgress');
            const percentage = (secondsPassed / refreshInterval) * 100;
            bar.style.width = `${percentage}%`;
        }

        function parseCSV(csv) {
            const lines = csv.split('\n');
            return lines.slice(1).filter(l => l.trim()).map(line => {
                const cols = line.split(/,(?=(?:[^"]*"[^"]*")*[^"]*$)/).map(c => c.replace(/"/g, '').trim());
                
                const monthlyData = cols.slice(1, 13).map(v => parseFloat(v.replace(/[^0-9.-]+/g, "")) || 0);
                const totalYearly = parseFloat(cols[13]?.replace(/[^0-9.-]+/g, "") || 0);

                return { 
                    name: cols[0], 
                    monthly: monthlyData,
                    total: totalYearly
                };
            }).filter(d => d.name && d.name.toLowerCase() !== 'nama');
        }

        function switchView(view) {
            currentView = view;
            const btnMonth = document.getElementById('btnMonth');
            const btnYear = document.getElementById('btnYear');
            const monthContainer = document.getElementById('monthSelectorContainer');
            
            if(view === 'month') {
                btnMonth.className = "px-6 py-2 rounded-xl text-sm font-bold bg-blue-600 text-white shadow-md";
                btnYear.className = "px-6 py-2 rounded-xl text-sm font-bold text-slate-500 hover:bg-slate-50";
                monthContainer.classList.remove('hidden');
            } else {
                btnYear.className = "px-6 py-2 rounded-xl text-sm font-bold bg-blue-600 text-white shadow-md";
                btnMonth.className = "px-6 py-2 rounded-xl text-sm font-bold text-slate-500 hover:bg-slate-50";
                monthContainer.classList.add('hidden');
            }
            updateDashboard();
        }

        function updateDashboard() {
            const monthSelector = document.getElementById('monthSelector');
            const selectedMonthIdx = parseInt(monthSelector.value);
            const labels = document.querySelectorAll('.view-label');
            
            labels.forEach(el => el.innerText = currentView === 'month' ? monthNames[selectedMonthIdx] : 'Total 2024');

            let displayData = rawData.map(d => ({
                name: d.name,
                value: currentView === 'month' ? d.monthly[selectedMonthIdx] : d.total
            }));
            
            displayData.sort((a,b) => b.value - a.value);

            const body = document.getElementById('leaderboardBody');
            body.innerHTML = '';
            let totalUnit = 0;

            displayData.forEach((d, i) => {
                totalUnit += d.value;
                let badge = "bg-slate-100 text-slate-500";
                if(i===0 && d.value > 0) badge = "rank-gold text-white shadow-sm";
                else if(i===1 && d.value > 0) badge = "rank-silver text-white shadow-sm";
                else if(i===2 && d.value > 0) badge = "rank-bronze text-white shadow-sm";

                body.innerHTML += `
                    <tr class="hover:bg-slate-50 transition-colors border-b border-slate-50 last:border-0">
                        <td class="px-6 py-4 w-16">
                            <span class="w-7 h-7 flex items-center justify-center rounded-lg text-[10px] font-black ${badge}">${i+1}</span>
                        </td>
                        <td class="py-4 font-bold text-slate-700">${d.name}</td>
                        <td class="px-6 py-4 text-right font-mono font-black text-slate-900">${d.value.toLocaleString()}</td>
                    </tr>
                `;
            });

            document.getElementById('statTotal').innerText = totalUnit.toLocaleString();
            document.getElementById('statTop').innerText = displayData[0]?.value > 0 ? displayData[0].name : "-";
            document.getElementById('statHighest').innerText = (displayData[0]?.value || 0).toLocaleString();
            
            const activeSales = displayData.filter(x => x.value > 0).length || 1;
            document.getElementById('statAvg').innerText = (totalUnit / activeSales).toFixed(1);

            renderChart(displayData);
        }

        function renderChart(data) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if(mainChart) mainChart.destroy();
            
            const chartData = data.filter(d => d.value > 0).slice(0, 15);
            
            mainChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: chartData.map(d => d.name),
                    datasets: [{
                        label: 'Unit',
                        data: chartData.map(d => d.value),
                        backgroundColor: chartData.map((_, i) => i === 0 ? '#f59e0b' : '#3b82f6'),
                        borderRadius: 8,
                        barThickness: 'flex',
                        maxBarThickness: 35
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: {
                        duration: 500 // Animasi lebih cepat agar terasa responsif saat auto-update
                    },
                    plugins: { 
                        legend: { display: false },
                        tooltip: { backgroundColor: '#1e293b', padding: 12 }
                    },
                    scales: { 
                        y: { grid: { display: false }, ticks: { font: { weight: 'bold' } } },
                        x: { beginAtZero: true, grid: { color: '#f1f5f9' } }
                    }
                }
            });
        }

        window.onload = () => {
            init().then(() => switchView('month'));
        };
    </script>
</body>
</html>
